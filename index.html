<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pride Tech Bus Check-in</title>
  <style>
    :root {
      --bg:#f7f3ff; --bg2:#e9fbff; --card:#ffffff; --text:#141427; --muted:#5d6077;
      --purple:#7c3aed; --purple2:#a855f7; --purple-soft:#f1e9ff;
      --green:#059669; --green-soft:#dcfce7; --orange:#f97316; --orange-soft:#fff1e6;
      --blue:#2563eb; --blue-soft:#e7f0ff; --teal:#0d9488; --pink:#db2777;
      --red:#dc2626; --red-soft:#fee2e2; --border:#ddd6fe; --shadow:0 14px 34px rgba(59,42,120,.14);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:radial-gradient(circle at top left,#ffe8f5 0,#f7f3ff 32%,#e9fbff 100%); color:var(--text); min-height:100vh; }
    header { position:sticky; top:0; z-index:10; color:white; background:linear-gradient(135deg,#7c3aed 0%,#2563eb 50%,#0d9488 100%); padding:16px 14px 18px; border-bottom:1px solid rgba(255,255,255,.25); box-shadow:0 12px 28px rgba(37,99,235,.22); }
    h1 { margin:0 0 4px; font-size:28px; letter-spacing:-.03em; }
    .subtitle { color:rgba(255,255,255,.88); font-size:14px; line-height:1.35; } .hint { color:var(--muted); font-size:14px; line-height:1.35; }
    main { padding:14px; max-width:940px; margin:auto; }
    input, button { font:inherit; border-radius:15px; border:1px solid var(--border); padding:13px; }
    input { width:100%; background:white; }
    button { background:white; font-weight:800; cursor:pointer; }
    button.primary { background:var(--purple); color:white; border-color:var(--purple); }
    button.success { background:var(--green); color:white; border-color:var(--green); }
    button.danger { background:var(--red-soft); color:var(--red); border-color:#fecaca; }
    button.small { padding:9px 11px; font-size:14px; }
    .tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:12px; }
    .tab { border:1px solid rgba(255,255,255,.7); border-radius:20px; padding:12px 6px; text-align:center; background:rgba(255,255,255,.88); color:#1f2350; box-shadow:0 10px 22px rgba(20,20,60,.16); user-select:none; cursor:pointer; transition:.15s ease; } .tab:active { transform:scale(.98); }
    .tab b { display:block; font-size:22px; margin-bottom:2px; }
    .tab.pending.active { background:linear-gradient(135deg,#ffedd5,#fed7aa); border-color:#fdba74; color:#7c2d12; }
    .tab.arrived.active { background:linear-gradient(135deg,#dcfce7,#bbf7d0); border-color:#86efac; color:#14532d; }
    .tab.all.active { background:linear-gradient(135deg,#dbeafe,#bfdbfe); border-color:#93c5fd; color:#1e3a8a; }
    .tab.waiting.active { background:linear-gradient(135deg,#f3e8ff,#ddd6fe); border-color:#c4b5fd; color:#4c1d95; }
    .toolbar { display:grid; gap:10px; margin:14px 0; }
    .panel { background:rgba(255,255,255,.82); border:1px solid var(--border); border-radius:24px; padding:12px; box-shadow:var(--shadow); }
    .section-title { margin:4px 2px 12px; font-size:18px; }
    .person { background:var(--card); border:1px solid var(--border); border-left:7px solid var(--orange); border-radius:22px; padding:14px; margin:10px 0; box-shadow:0 8px 20px rgba(60,42,100,.09); }
    .person.arrived { border-left-color:var(--green); background:#f0fdf4; }
    .person.waiting { border-left-color:var(--purple); background:#fbf9ff; }
    .row { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; } .person-main { display:flex; gap:12px; align-items:flex-start; } .avatar { flex:0 0 42px; height:42px; border-radius:14px; display:grid; place-items:center; font-weight:900; color:white; background:linear-gradient(135deg,var(--purple),var(--pink)); box-shadow:0 6px 14px rgba(124,58,237,.22); }
    .name { font-weight:900; font-size:18px; margin-bottom:3px; }
    .phone { color:var(--muted); direction:ltr; text-align:left; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .tag { display:inline-block; margin-top:7px; padding:4px 9px; border-radius:999px; font-size:12px; font-weight:900; background:#eef2ff; color:#4338ca; }
    .add-box { background:white; border:1px solid var(--border); border-radius:22px; padding:14px; display:grid; gap:10px; box-shadow:var(--shadow); margin-bottom:12px; }
    .empty { text-align:center; padding:24px 12px; }
    footer { padding:10px 2px 26px; }
    @media (min-width:720px){ .add-box { grid-template-columns:1fr 1fr auto; align-items:center; } }
    @media (max-width:520px){ .tabs { grid-template-columns:repeat(2,1fr); } .tab b { font-size:20px; } }
  </style>
</head>
<body>
<header>
  <h1>Pride Tech Bus Check-in</h1>
  <div class="subtitle" id="status">Loading list from Google Sheets...</div>
  <div class="tabs">
    <div id="tabPending" class="tab pending active"><b id="pendingCount">0</b>Pending</div>
    <div id="tabArrived" class="tab arrived"><b id="arrivedCount">0</b>Arrived</div>
    <div id="tabAll" class="tab all"><b id="totalCount">0</b>All</div>
    <div id="tabWaiting" class="tab waiting"><b id="waitingCount">0</b>Waiting list</div>
  </div>
</header>

<main>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search by name or phone" />
  </div>

  <section id="mainSection" class="panel">
    <h2 class="section-title" id="mainTitle">Pending</h2>
    <div id="list"></div>
  </section>

  <section id="waitingSection" style="display:none;">
    <div class="add-box">
      <input id="newName" placeholder="New person name" />
      <input id="newPhone" placeholder="Phone number" inputmode="tel" />
      <button id="addPerson" class="primary">Add to waiting list</button>
    </div>
    <div class="panel">
      <h2 class="section-title">Waiting list</h2>
      <div id="waitingList"></div>
    </div>
  </section>

  <footer class="hint">
    Only rows with Status = Approved are loaded from Google Sheets. Check-ins, deletions, and waiting list changes are saved on this iPad/browser only.
  </footer>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7rhjt4HNMhz3tUzZMcFaqoxXVNHnO6Qg8mBkBcu6dmMOCGIP18OaEsTQXwgQ06uyqpgl-P5a9SxoO/pub?gid=1845266870&single=true&output=csv";
const STORAGE_KEY = "pride-tech-bus-v5";
let people = [];
let currentView = "pending";

function normalizePhone(v) { return String(v || "").replace(/\.0$/, "").trim(); }
function makeId(name, phone) { return `${String(name).trim().toLowerCase()}|${normalizePhone(phone).replace(/\D/g, "")}`; }
function escapeHtml(s) { return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function safeJs(s) { return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function sortByName(list) {
  return [...list].sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), undefined, { sensitivity: "base" }));
}
function initialOf(name) {
  const clean = String(name || "?").trim();
  return escapeHtml((clean[0] || "?").toUpperCase());
}

function parseCSV(text) {
  const rows = []; let row = [], value = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (c === '"' && inQuotes && n === '"') { value += '"'; i++; }
    else if (c === '"') inQuotes = !inQuotes;
    else if (c === ',' && !inQuotes) { row.push(value); value = ""; }
    else if ((c === '\n' || c === '\r') && !inQuotes) {
      if (value || row.length) { row.push(value); rows.push(row); row = []; value = ""; }
      if (c === '\r' && n === '\n') i++;
    } else value += c;
  }
  if (value || row.length) { row.push(value); rows.push(row); }
  return rows;
}

function findHeader(headers, options) {
  return headers.findIndex(h => options.some(opt => h === opt || h.includes(opt)));
}

function rowsToPeople(rows) {
  if (!rows.length) return [];
  const headers = rows[0].map(h => String(h).trim().toLowerCase());
  const nameIndex = findHeader(headers, ["name", "full name", "שם", "שם מלא"]);
  const phoneIndex = findHeader(headers, ["phone", "mobile", "telephone", "טלפון", "נייד"]);
  const statusIndex = findHeader(headers, ["status", "סטטוס"]);
  const fallbackName = nameIndex >= 0 ? nameIndex : 0;
  const fallbackPhone = phoneIndex >= 0 ? phoneIndex : 1;
  return rows.slice(1).filter(r => {
    if (statusIndex < 0) return true;
    return String(r[statusIndex] || "").trim().toLowerCase() === "approved";
  }).map(r => {
    const name = String(r[fallbackName] || "").trim();
    const phone = normalizePhone(r[fallbackPhone]);
    return { id: makeId(name, phone), name, phone, arrived:false, deleted:false, manual:false, waiting:false };
  }).filter(p => p.name || p.phone).sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), undefined, { sensitivity: "base" }));
}

function mergeWithSaved(freshPeople) {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
  if (!saved) return freshPeople;
  const byId = new Map(saved.map(p => [p.id, p]));
  const merged = freshPeople.map(p => ({ ...p, ...(byId.get(p.id) || {}), manual:false, waiting:false }));
  const localOnly = saved.filter(p => (p.manual || p.waiting) && !merged.some(x => x.id === p.id));
  return sortByName([...merged, ...localOnly]);
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(people)); }
async function loadPeople() {
  const status = document.getElementById("status");
  try {
    const res = await fetch(CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Could not load CSV.");
    const fresh = rowsToPeople(parseCSV(await res.text()));
    people = mergeWithSaved(fresh);
    status.textContent = `Loaded ${fresh.length} approved people from Google Sheets.`;
  } catch (err) {
    people = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    status.textContent = `Google Sheets was not loaded. Using saved local list only. ${err.message}`;
  }
  render();
}

function mainPeople() { return sortByName(people.filter(p => !p.deleted && !p.waiting)); }
function waitingPeople() { return sortByName(people.filter(p => !p.deleted && p.waiting)); }
function filteredMain() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  return mainPeople()
    .filter(p => currentView === "all" || (currentView === "pending" && !p.arrived) || (currentView === "arrived" && p.arrived))
    .filter(p => !q || p.name.toLowerCase().includes(q) || p.phone.toLowerCase().includes(q));
}
function filteredWaiting() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  return waitingPeople().filter(p => !q || p.name.toLowerCase().includes(q) || p.phone.toLowerCase().includes(q));
}

function personCard(p) {
  return `<div class="person ${p.arrived ? "arrived" : ""}">
    <div class="row"><div class="person-main"><div class="avatar">${initialOf(p.name)}</div><div><div class="name">${escapeHtml(p.name || "No name")}</div><div class="phone">${escapeHtml(p.phone || "No phone")}</div>${p.manual ? `<span class="tag">Moved from waiting list</span>` : ``}</div></div>
    <button class="${p.arrived ? "" : "success"} small" onclick="toggleArrived('${safeJs(p.id)}')">${p.arrived ? "Undo" : "Arrived"}</button></div>
    <div class="actions"><button class="small" onclick="copyPhone('${safeJs(p.phone)}')">Copy phone</button><a href="tel:${encodeURIComponent(p.phone)}"><button class="small">Call</button></a><button class="danger small" onclick="deletePerson('${safeJs(p.id)}')">Delete</button></div>
  </div>`;
}
function waitingCard(p) {
  return `<div class="person waiting">
    <div class="row"><div class="person-main"><div class="avatar">${initialOf(p.name)}</div><div><div class="name">${escapeHtml(p.name || "No name")}</div><div class="phone">${escapeHtml(p.phone || "No phone")}</div><span class="tag">Waiting list</span></div></div>
    <button class="success small" onclick="moveToMain('${safeJs(p.id)}')">Move to list</button></div>
    <div class="actions"><button class="small" onclick="copyPhone('${safeJs(p.phone)}')">Copy phone</button><a href="tel:${encodeURIComponent(p.phone)}"><button class="small">Call</button></a><button class="danger small" onclick="deletePerson('${safeJs(p.id)}')">Delete</button></div>
  </div>`;
}

function render() {
  document.getElementById("tabPending").classList.toggle("active", currentView === "pending");
  document.getElementById("tabArrived").classList.toggle("active", currentView === "arrived");
  document.getElementById("tabAll").classList.toggle("active", currentView === "all");
  document.getElementById("tabWaiting").classList.toggle("active", currentView === "waiting");
  document.getElementById("pendingCount").textContent = mainPeople().filter(p => !p.arrived).length;
  document.getElementById("arrivedCount").textContent = mainPeople().filter(p => p.arrived).length;
  document.getElementById("totalCount").textContent = mainPeople().length;
  document.getElementById("waitingCount").textContent = waitingPeople().length;
  document.getElementById("mainSection").style.display = currentView === "waiting" ? "none" : "block";
  document.getElementById("waitingSection").style.display = currentView === "waiting" ? "block" : "none";
  const titles = { pending:"Pending", arrived:"Arrived", all:"All" };
  document.getElementById("mainTitle").textContent = titles[currentView] || "Pending";
  document.getElementById("list").innerHTML = filteredMain().map(personCard).join("") || `<p class="hint empty">No matching people in this list.</p>`;
  document.getElementById("waitingList").innerHTML = filteredWaiting().map(waitingCard).join("") || `<p class="hint empty">Waiting list is empty.</p>`;
  save();
}

function copyPhone(phone) { navigator.clipboard.writeText(phone).then(() => alert(`Copied: ${phone}`)); }
function toggleArrived(id) { const p = people.find(x => x.id === id); if (p) { p.arrived = !p.arrived; render(); } }
function deletePerson(id) { const p = people.find(x => x.id === id); if (p && confirm(`Delete ${p.name || p.phone}?`)) { p.deleted = true; render(); } }
function moveToMain(id) { const p = people.find(x => x.id === id); if (p) { p.waiting = false; p.manual = true; p.arrived = false; people = sortByName(people); currentView = "pending"; render(); } }

window.copyPhone = copyPhone; window.toggleArrived = toggleArrived; window.deletePerson = deletePerson; window.moveToMain = moveToMain;
document.getElementById("search").addEventListener("input", render);
document.getElementById("tabPending").addEventListener("click", () => { currentView = "pending"; render(); });
document.getElementById("tabArrived").addEventListener("click", () => { currentView = "arrived"; render(); });
document.getElementById("tabAll").addEventListener("click", () => { currentView = "all"; render(); });
document.getElementById("tabWaiting").addEventListener("click", () => { currentView = "waiting"; render(); });
document.getElementById("addPerson").addEventListener("click", () => {
  const name = document.getElementById("newName").value.trim();
  const phone = normalizePhone(document.getElementById("newPhone").value);
  if (!name && !phone) return alert("Add a name or phone.");
  people.push({ id: makeId(name, phone) + `|wait-${Date.now()}`, name, phone, arrived:false, deleted:false, manual:true, waiting:true });
  people = sortByName(people);
  document.getElementById("newName").value = ""; document.getElementById("newPhone").value = ""; render();
});
loadPeople();
</script>
</body>
</html>
